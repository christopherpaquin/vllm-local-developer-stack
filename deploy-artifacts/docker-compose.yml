# =============================================================================
# docker-compose.yml
# vLLM OpenAI-compatible inference server — dual RTX 3060 (Tensor Parallel)
#
# Direct usage (advanced):
#   docker compose -f deploy/docker-compose.yml up -d
#
# Recommended: use the deployment orchestrator instead:
#   bash scripts/deploy/deploy.sh
#   bash scripts/deploy/teardown.sh
# =============================================================================

services:

  vllm:
    # -------------------------------------------------------------------------
    # Image: Official vLLM OpenAI-compatible server
    # Pin to a specific tag in production to avoid breaking changes:
    #   e.g., vllm/vllm-openai:v0.6.3
    # -------------------------------------------------------------------------
    image: vllm/vllm-openai:latest
    container_name: vllm-coder-server

    # -------------------------------------------------------------------------
    # Network: bind API port to the host interface specified by BIND_HOST.
    # BIND_HOST=0.0.0.0 → all interfaces (LAN accessible)
    # BIND_HOST=127.0.0.1 → localhost only
    # BIND_HOST=192.168.x.x → specific LAN interface
    # Set BIND_HOST in deploy/.env or let deploy.sh auto-detect it.
    # -------------------------------------------------------------------------
    ports:
      - "${BIND_HOST:-0.0.0.0}:${PORT:-8000}:8000"

    # -------------------------------------------------------------------------
    # Volumes
    #   • HuggingFace model cache: avoids re-downloading the model
    #     on every container restart (~9 GiB for Qwen2.5-Coder-14B-AWQ)
    # -------------------------------------------------------------------------
    volumes:
      - type: bind
        source: ${HF_CACHE_DIR:-~/.cache/huggingface}
        target: /root/.cache/huggingface
        bind:
          create_host_path: true

    # -------------------------------------------------------------------------
    # GPU resource reservation: expose ALL NVIDIA GPUs to the container.
    # vLLM selects GPUs via TENSOR_PARALLEL_SIZE — it will use 2 GPUs.
    # Requires: nvidia-container-toolkit + Docker NVIDIA runtime registered.
    # -------------------------------------------------------------------------
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              capabilities: [gpu]
              device_ids:
                - "${GPU_DEVICE_ID:-nvidia.com/gpu=all}"

    # -------------------------------------------------------------------------
    # Environment variables forwarded from deploy/.env (generated by tune-inference.sh)
    # -------------------------------------------------------------------------
    env_file:
      - ../scripts/deploy/.env

    environment:
      # model is gated. Qwen2.5-Coder-14B-Instruct-AWQ is public (not gated).
      - HF_TOKEN=${HF_TOKEN:-}
      # Disable HuggingFace progress bars in container logs (cleaner output)
      - HF_HUB_DISABLE_PROGRESS_BARS=1
      # Use the container-internal cache path
      - HF_HOME=/root/.cache/huggingface
      # Suppress tokenizer parallelism warning (safe for inference-only mode)
      - TOKENIZERS_PARALLELISM=false
      # NCCL verbosity: 0=silent, 3=debug. Keep at 0 for production.
      - NCCL_DEBUG=0

    # -------------------------------------------------------------------------
    # Server command: constructed from .env variables.
    # All parameters are explained inline below.
    # -------------------------------------------------------------------------
    command: >
      --model                  ${MODEL}
      --tensor-parallel-size   ${TENSOR_PARALLEL_SIZE}
      --quantization           ${QUANTIZATION:-awq}
      --max-model-len          ${MAX_MODEL_LEN}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION}
      --host                   0.0.0.0
      --port                   8000
      --served-model-name      ${SERVED_MODEL_NAME:-qwen2.5-coder-14b-awq}
      --enable-auto-tool-choice
      --no-enable-log-requests

    # -------------------------------------------------------------------------
    # Health check: poll the /health endpoint until server is ready.
    # Model loading + KV cache allocation typically takes 2–5 minutes.
    # -------------------------------------------------------------------------
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

    # -------------------------------------------------------------------------
    # Restart policy: restart unless explicitly stopped (docker compose down)
    # -------------------------------------------------------------------------
    restart: ${VLLM_RESTART_POLICY:-unless-stopped}

    # -------------------------------------------------------------------------
    # Shared memory: PyTorch DataLoader and NCCL require sufficient /dev/shm.
    # 12 GiB is recommended for tensor parallel models.
    # -------------------------------------------------------------------------
    shm_size: '12gb'

    # -------------------------------------------------------------------------
    # Ulimits: allow large memory maps (required for mmap-based model loading)
    # -------------------------------------------------------------------------
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

    # -------------------------------------------------------------------------
    # Logging: use json-file with rotation to prevent disk exhaustion
    # -------------------------------------------------------------------------
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
